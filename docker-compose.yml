version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pedja_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pedja}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pedja_secret}
      POSTGRES_DB: ${DB_NAME:-pedja_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedja"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedja_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pedja_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pedja_network

  # Backend API (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: pedja_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${DB_USER:-pedja}:${DB_PASSWORD:-pedja_secret}@postgres:5432/${DB_NAME:-pedja_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MOBILE_MONEY_API_KEY: ${MOBILE_MONEY_API_KEY}
      MOBILE_MONEY_API_SECRET: ${MOBILE_MONEY_API_SECRET}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pedja_network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: pedja_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - pedja_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pedja_network:
    driver: bridge
